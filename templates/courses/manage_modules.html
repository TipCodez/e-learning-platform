{% extends "base.html" %}
{% block content %}<section class="section-pad"><div class="container"><h1 class="h2 text-slate">Manage Modules: {{ course.title }}</h1><div class="row g-4"><div class="col-lg-5"><form class="dashboard-card" method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Add Module</button></form></div><div class="col-lg-7">{% for module in course.modules.all %}<div class="dashboard-card mb-2"><strong>{{ module.order }}. {{ module.title }}</strong><p>{{ module.description }}</p></div>{% empty %}<div class="empty-state">No modules yet.</div>{% endfor %}</div></div></div></section>{% endblock %}
