{% extends "base.html" %}
{% block title %}Create Account | Acadeval{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <span class="eyebrow">Join Acadeval</span>
    <h1 class="h2 text-slate mb-4">Create your account</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100" type="submit">Create Account</button>
    </form>
    <p class="text-center mt-3 mb-0">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
  </div>
</section>
{% endblock %}
