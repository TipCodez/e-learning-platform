{% extends "base.html" %}
{% block content %}
<section class="auth-section">
  <div class="auth-card wide">
    <span class="eyebrow">{{ post.title }}</span>
    <h1 class="h2 text-slate">Edit Blog Content Block</h1>
    <form method="post" enctype="multipart/form-data" data-builder-form>
      {% csrf_token %}
      {{ form.as_p }}
      <div class="builder-tools">
        <h2 class="h6 text-slate">Table helper</h2>
        <div class="row g-2">
          <div class="col-6"><input class="form-control" type="number" min="1" max="8" value="3" data-table-columns aria-label="Table columns"></div>
          <div class="col-6"><input class="form-control" type="number" min="1" max="20" value="4" data-table-rows aria-label="Table rows"></div>
        </div>
        <button class="btn btn-outline-primary btn-sm mt-2" type="button" data-build-table>Insert table scaffold</button>
      </div>
      <div class="builder-image-preview" data-image-preview>{% if block.image %}<img src="{{ block.image.url }}" alt="{{ block.image_alt|default:block.title }}">{% endif %}</div>
      <div class="builder-live-preview mt-3">
        <h2 class="h6 text-slate">Live Preview</h2>
        <div class="article-body" data-live-preview></div>
      </div>
      <button class="btn btn-primary mt-3" type="submit">Update Block</button>
      <a class="btn btn-outline-primary mt-3" href="{% url 'core:manage_blog_blocks' post.slug %}">Cancel</a>
    </form>
  </div>
</section>
{% endblock %}
