{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container"><h1 class="h2 text-slate">My Courses</h1>{% for enrollment in enrollments %}<div class="dashboard-card mb-2"><strong>{{ enrollment.course.title }}</strong><span>{{ enrollment.status }}</span><a class="btn btn-sm btn-outline-primary float-end" href="{{ enrollment.course.get_absolute_url }}">Open</a></div>{% empty %}<div class="empty-state">No enrollments yet.</div>{% endfor %}</div></section>{% endblock %}
