{% extends "base.html" %}
{% block title %}Contact Support | Acadeval{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card wide">
    <span class="eyebrow">Support ticket</span>
    <h1 class="h2 text-slate mb-3">Contact Acadeval</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary">Send Request</button>
    </form>
  </div>
</section>
{% endblock %}
