{% extends "base.html" %}
{% block content %}
<section class="auth-section">
  <div class="auth-card wide">
    <span class="eyebrow">{{ lesson.title }}</span>
    <h1 class="h2 text-slate">Edit Content Block</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Update Block</button>
      <a class="btn btn-outline-primary" href="{% url 'courses:manage_lesson_blocks' course.slug lesson.id %}">Cancel</a>
    </form>
  </div>
</section>
{% endblock %}
