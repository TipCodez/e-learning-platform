{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container"><h1 class="h2 text-slate">My Certificates</h1>{% for certificate in certificates %}<div class="dashboard-card mb-2"><strong>{{ certificate.course.title }}</strong><span>{{ certificate.certificate_id }}</span><a class="btn btn-sm btn-outline-primary float-end" href="{% url 'certificates:detail' certificate.certificate_id %}">Open</a></div>{% empty %}<div class="empty-state">No certificates earned yet.</div>{% endfor %}</div></section>{% endblock %}
