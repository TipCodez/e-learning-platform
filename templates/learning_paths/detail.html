{% extends "base.html" %}{% block content %}<section class="page-hero"><div class="container"><h1 class="display-5 fw-bold text-slate">{{ learning_path.title }}</h1><p class="lead">{{ learning_path.description }}</p></div></section><section class="section-pad"><div class="container narrow">{% for item in learning_path.path_courses.all %}<div class="dashboard-card mb-2"><strong>{{ item.order }}. {{ item.course.title }}</strong><a class="btn btn-sm btn-outline-primary float-end" href="{{ item.course.get_absolute_url }}">View</a></div>{% empty %}<div class="empty-state">No courses in this path yet.</div>{% endfor %}</div></section>{% endblock %}
