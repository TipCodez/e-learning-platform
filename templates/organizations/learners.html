{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container"><h1 class="h2 text-slate">Organization Learners</h1><div class="row g-4"><div class="col-lg-5"><form class="dashboard-card" method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Add Learner</button></form></div><div class="col-lg-7">{% for record in records %}<div class="dashboard-card mb-2"><strong>{{ record.learner.email }}</strong><span>{{ record.department }}</span></div>{% empty %}<div class="empty-state">No learners yet.</div>{% endfor %}</div></div></div></section>{% endblock %}
