{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Acadeval{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/acadeval.css' %}?v=20260702-base">
  <link rel="stylesheet" href="{% static 'css/dark-ui.css' %}?v=20260703-light-fix">
</head>
<body class="acadeval-dark">
  <script>
    (() => {
      const theme = localStorage.getItem("acadeval-theme") || "dark";
      document.body.classList.toggle("acadeval-light", theme === "light");
      document.body.classList.toggle("acadeval-dark", theme !== "light");
    })();
  </script>
  {% include "partials/navbar.html" %}

  {% if messages %}
    <div class="toast-stack">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} shadow-sm fade show" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}
  {% include "partials/ai_widget.html" %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/acadeval.js' %}?v=20260703-theme-toggle"></script>
</body>
</html>
