{% extends "base.html" %}{% block content %}<section class="page-hero"><div class="container narrow text-center"><span class="eyebrow">Certificate of Completion</span><h1 class="display-6 fw-bold text-slate">{{ certificate.course.title }}</h1><p class="lead">Awarded to {{ certificate.student.get_full_name|default:certificate.student.username }}</p><p>ID: {{ certificate.certificate_id }}</p><a class="btn btn-primary" href="{% url 'certificates:verify' certificate.certificate_id %}">Public Verification</a></div></section>{% endblock %}
