{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container"><div class="d-flex justify-content-between"><h1 class="h2 text-slate">Notifications</h1><a href="{% url 'notifications:read_all' %}" class="btn btn-outline-primary">Mark all read</a></div>{% for notification in notifications %}<div class="dashboard-card mb-2"><strong>{{ notification.title }}</strong><p>{{ notification.message }}</p></div>{% empty %}<div class="empty-state">No notifications.</div>{% endfor %}</div></section>{% endblock %}
