{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container narrow"><h1 class="h2 text-slate">{{ quiz.title }}</h1><p>{{ quiz.description }}</p><form method="post" class="dashboard-card">{% csrf_token %}{% for question in quiz.questions.all %}<div class="mb-4"><strong>{{ forloop.counter }}. {{ question.text }}</strong>{% for option in question.options.all %}<label class="d-block mt-2"><input type="radio" name="question_{{ question.id }}" value="{{ option.id }}"> {{ option.text }}</label>{% endfor %}</div>{% endfor %}<button class="btn btn-primary">Submit Quiz</button></form></div></section>{% endblock %}
