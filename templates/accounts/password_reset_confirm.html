{% extends "base.html" %}
{% block title %}Choose New Password | Acadeval{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <h1 class="h2 text-slate mb-3">Choose a new password</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100" type="submit">Update Password</button>
    </form>
  </div>
</section>
{% endblock %}
