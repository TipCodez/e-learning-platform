{% extends "base.html" %}{% block content %}<section class="page-hero"><div class="container"><h1 class="display-5 fw-bold text-slate">Learning Paths</h1><p class="lead">Structured career routes made from sequenced courses.</p></div></section><section class="section-pad"><div class="container"><div class="row g-3">{% for path in paths %}<div class="col-md-6"><div class="dashboard-card"><strong>{{ path.title }}</strong><p>{{ path.description|truncatewords:24 }}</p><a class="btn btn-outline-primary" href="{% url 'learning_paths:detail' path.slug %}">Open Path</a></div></div>{% empty %}<div class="empty-state">Learning paths can be added in admin.</div>{% endfor %}</div></div></section>{% endblock %}
