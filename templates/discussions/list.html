{% extends "base.html" %}{% block content %}<section class="section-pad"><div class="container"><div class="d-flex justify-content-between"><h1 class="h2 text-slate">Community</h1>{% if user.is_authenticated %}<a class="btn btn-primary" href="{% url 'discussions:create' %}">Ask Question</a>{% endif %}</div>{% for discussion in discussions %}<div class="dashboard-card mb-2"><strong>{{ discussion.title }}</strong><p>{{ discussion.body|truncatewords:20 }}</p><a href="{% url 'discussions:detail' discussion.id %}">Open discussion</a></div>{% empty %}<div class="empty-state">No discussions yet.</div>{% endfor %}</div></section>{% endblock %}
